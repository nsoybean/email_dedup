# Postgres for local integration tests and Phase 5 development.
# Host port 5433 avoids clashing with other local Postgres (e.g. Langfuse on 5432).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: email
      POSTGRES_PASSWORD: email
      POSTGRES_DB: email_dedup
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U email -d email_dedup"]
      interval: 2s
      timeout: 5s
      retries: 20
