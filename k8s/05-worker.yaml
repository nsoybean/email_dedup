apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: email-dedup
  labels:
    app: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: email-dedup:local
          imagePullPolicy: Never
          command: ["python", "-m", "email_dedup.worker"]
          envFrom:
            - configMapRef:
                name: email-dedup-config
            - secretRef:
                name: email-dedup-secret
