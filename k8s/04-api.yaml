apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: email-dedup
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: email-dedup:local
          imagePullPolicy: Never
          command:
            - uvicorn
            - email_dedup.api.app:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: email-dedup-config
            - secretRef:
                name: email-dedup-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: email-dedup
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
