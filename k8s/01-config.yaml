apiVersion: v1
kind: ConfigMap
metadata:
  name: email-dedup-config
  namespace: email-dedup
data:
  EMAIL_DEDUP_ENV: "kubernetes"
  EMAIL_DEDUP_LOG_LEVEL: "INFO"
  WORKER_POLL_INTERVAL_SECONDS: "0.5"
  WORKER_MAX_ATTEMPTS: "3"
  API_BASE_URL: "http://api:8000"
---
apiVersion: v1
kind: Secret
metadata:
  name: email-dedup-secret
  namespace: email-dedup
type: Opaque
stringData:
  POSTGRES_USER: email
  POSTGRES_PASSWORD: email
  POSTGRES_DB: email_dedup
  # Workers/API/migrate use SQLAlchemy URL (psycopg driver).
  DATABASE_URL: postgresql+psycopg://email:email@postgres:5432/email_dedup
